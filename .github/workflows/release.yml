name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check whether this branch can release
        id: release_policy
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Unsupported release branch: ${GITHUB_REF_NAME}."
            echo "Releases can only run from main."
            exit 1
          fi

          echo "release_enabled=true" >> "$GITHUB_OUTPUT"

      - name: Detect pending changesets
        if: steps.release_policy.outputs.release_enabled == 'true'
        id: pending_changesets
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply changeset version bumps
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.pending_changesets.outputs.has_changesets == 'true'
        run: bun run ci:version

      - name: Commit version updates
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.pending_changesets.outputs.has_changesets == 'true'
        id: version_commit
        run: |
          if git diff --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release packages"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Push version updates to main
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.version_commit.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:${GITHUB_REF_NAME}
